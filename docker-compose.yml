services:
  postgres:
    image: postgres:16-alpine
    container_name: larynx-postgres
    environment:
      POSTGRES_USER: larynx
      POSTGRES_PASSWORD: larynx
      POSTGRES_DB: larynx
    ports:
      - "5433:5432"
    volumes:
      - larynx-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U larynx -d larynx"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: larynx-redis
    ports:
      - "6380:6379"
    volumes:
      - larynx-redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  # Fun-ASR STT worker — pinned to GPU 1 via CUDA_VISIBLE_DEVICES so it
  # never competes with VoxCPM2 (GPU 0). Opt-in (`--profile workers`) so
  # laptops without CUDA can still bring up postgres/redis.
  funasr_worker:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: docker/funasr_worker.Dockerfile
    container_name: larynx-funasr-worker
    environment:
      LARYNX_STT_MODE: funasr
      LARYNX_FUNASR_GPU: "0"  # 0 inside the container = GPU 1 on the host
      CUDA_VISIBLE_DEVICES: "1"
      HF_HOME: /app/.cache/huggingface
    volumes:
      - .:/app
      - larynx-hf-cache:/app/.cache/huggingface
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]
              capabilities: ["gpu"]
    restart: unless-stopped

  # VAD + Punctuation worker — CPU only.
  vad_punc_worker:
    profiles: ["workers"]
    build:
      context: .
      dockerfile: docker/vad_punc_worker.Dockerfile
    container_name: larynx-vad-punc-worker
    environment:
      LARYNX_VAD_PUNC_MODE: real
      LARYNX_VAD_MODEL: fsmn-vad
      LARYNX_PUNC_MODEL: ct-punc
      HF_HOME: /app/.cache/huggingface
    volumes:
      - .:/app
      - larynx-hf-cache:/app/.cache/huggingface
    restart: unless-stopped

volumes:
  larynx-postgres-data:
  larynx-redis-data:
  larynx-hf-cache:
