[project]
name = "larynx-shared"
version = "0.1.0"
description = "Shared IPC types, audio helpers, and tracing utilities for Larynx."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "numpy>=1.26",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/larynx_shared"]
