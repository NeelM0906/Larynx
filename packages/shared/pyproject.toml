[project]
name = "larynx-shared"
version = "0.1.0"
description = "Shared IPC types, audio helpers, and tracing utilities for Larynx."
requires-python = ">=3.11"
dependencies = [
    "pydantic>=2.7",
    "numpy>=1.26",
    # pyav wraps FFmpeg for in-process audio (re)encoding. Used by
    # ``larynx_shared.audio.encode`` for the OpenAI /v1/audio/speech
    # mp3/aac/opus/flac paths. Import is wrapped behind a try so a
    # broken install still lets wav/pcm routes work.
    "av>=12.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/larynx_shared"]
