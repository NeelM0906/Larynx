[project]
name = "larynx-funasr-worker"
version = "0.1.0"
description = "Fun-ASR STT worker (Nano + MLT-Nano via Fun-ASR-vllm) for the Larynx platform."
requires-python = ">=3.11"
dependencies = [
    "larynx-shared",
    "numpy>=1.26",
    "structlog>=24.1",
    # librosa handles audio decoding + resample in both mock and real paths
    # (gateway already resamples to 16 kHz mono, but defence in depth keeps
    # the worker self-contained for adhoc file inputs from tests/smoke).
    "librosa>=0.10",
    "soundfile>=0.12",
]

# The real backend pulls Fun-ASR (GitHub) + Fun-ASR-vllm (GitHub) + vllm +
# torch. These install only on CUDA; mock mode needs none of it. Enable on
# the GPU box with: uv sync --extra gpu
[project.optional-dependencies]
gpu = [
    "torch>=2.9,<2.10",
    "torchaudio>=2.9,<2.10",
    "transformers>=4.51.3",
    "funasr>=1.3.0",
    "vllm==0.13.0",
    "flash-attn==2.8.3",
    # FunAudioLLM/Fun-ASR and yuekaizhang/Fun-ASR-vllm ship their model.py
    # on the GitHub side (not on the HF snapshot). We install both as pip
    # requirements from a git URL pin; `model.py` then lives inside the
    # installed package dir and we import via trust_remote_code hand-off.
    # The package names here mirror what their setup.py declares.
]

[project.scripts]
larynx-funasr-worker = "larynx_funasr_worker.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/larynx_funasr_worker"]
