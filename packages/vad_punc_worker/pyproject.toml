[project]
name = "larynx-vad-punc-worker"
version = "0.1.0"
description = "CPU worker for FunASR fsmn-vad + CT-Transformer punctuation."
requires-python = ">=3.11"
dependencies = [
    "larynx-shared",
    "numpy>=1.26",
    "structlog>=24.1",
    # Prometheus sidecar (ORCHESTRATION-M8 §3.1). Same split as the
    # Fun-ASR worker: prometheus-client owns the registry, aiohttp
    # serves /metrics on :9102 when the worker runs standalone. The
    # in-process gateway path doesn't import metrics_server, so aiohttp
    # stays cold — but both deps have to be declared here so
    # supervisord can import them at worker boot.
    "prometheus-client>=0.20",
    "aiohttp>=3.9",
]

# FunASR pulls in torch (CPU wheel is fine — both fsmn-vad and ct-punc
# are tiny and run happily on CPU). Mock mode needs nothing extra, so
# the "real" deps live behind an extra to keep the default workspace
# install light.
[project.optional-dependencies]
real = [
    "funasr>=1.3.0",
    "modelscope>=1.20",
    "torch>=2.9,<2.10",
    "torchaudio>=2.9,<2.10",
]

[project.scripts]
larynx-vad-punc-worker = "larynx_vad_punc_worker.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/larynx_vad_punc_worker"]
