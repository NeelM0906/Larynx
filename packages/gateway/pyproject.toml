[project]
name = "larynx-gateway"
version = "0.1.0"
description = "FastAPI gateway for the Larynx voice platform."
requires-python = ">=3.11"
dependencies = [
    "larynx-shared",
    "larynx-voxcpm-worker",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "psycopg[binary]>=3.2",
    "structlog>=24.1",
    "python-multipart>=0.0.9",
    "redis>=5.0",
    "prometheus-client>=0.20",
    "httpx>=0.27",
]

[project.scripts]
larynx-gateway = "larynx_gateway.main:run"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/larynx_gateway"]

[tool.hatch.build.targets.wheel.force-include]
"alembic.ini" = "larynx_gateway/alembic.ini"
