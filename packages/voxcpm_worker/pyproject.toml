[project]
name = "larynx-voxcpm-worker"
version = "0.1.0"
description = "VoxCPM2 TTS worker (nano-vllm-voxcpm) for the Larynx platform."
requires-python = ">=3.11"
dependencies = [
    "larynx-shared",
    "numpy>=1.26",
    "structlog>=24.1",
    # librosa + soundfile are required in both real and mock mode: mock uses
    # librosa for decoding reference audio (so encode_reference produces
    # deterministic latents that reflect the input), soundfile writes WAV
    # output in the design preview path.
    "librosa>=0.10",
    "soundfile>=0.12",
]

# nano-vllm-voxcpm is an optional extra — it pulls in torch / flash-attn /
# triton which only install on a CUDA box. Switch on via:
#   uv sync --extra gpu
# The worker falls back to mock mode if the import fails, so the dev flow
# on CPU-only machines is unchanged.
[project.optional-dependencies]
gpu = [
    "nano-vllm-voxcpm==2.0.0",
    "torch>=2.9,<2.10",
    "flash-attn==2.8.3",
]

[project.scripts]
larynx-voxcpm-worker = "larynx_voxcpm_worker.main:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/larynx_voxcpm_worker"]
