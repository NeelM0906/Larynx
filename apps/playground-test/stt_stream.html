<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>STT stream test</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 800px; margin: 2em auto; padding: 0 1em; color: #222; }
    input[type=text] { width: 100%; padding: 6px; box-sizing: border-box; font: 14px monospace; }
    label { display:block; font-size: 13px; color: #555; margin: 12px 0 4px; }
    button { padding: 8px 16px; font-size: 14px; cursor: pointer; }
    .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .partial {
      font-family: system-ui; font-size: 17px; color: #555; padding: 10px; background: #fafafa;
      border: 1px solid #eee; border-radius: 6px; min-height: 2em;
    }
    .finals {
      font-family: system-ui; font-size: 17px; padding: 10px; background: #f0f7ff;
      border: 1px solid #dbe7f5; border-radius: 6px; margin-top: 0.5em; min-height: 2em;
    }
    .finals > div { margin-bottom: 0.4em; }
    .log { font: 12px/1.4 monospace; background: #222; color: #ddd; padding: 8px; border-radius: 6px; margin-top: 8px; height: 140px; overflow-y: auto; }
    .metrics { font: 13px/1.5 monospace; background: #f7f7f7; padding: 8px; border-radius: 6px; margin-top: 8px; }
  </style>
</head>
<body>
  <h1>STT streaming</h1>

  <label>Gateway host (ws)</label>
  <input id="host" type="text" value="ws://localhost:8000" />

  <label>Bearer token</label>
  <input id="token" type="text" placeholder="LARYNX_API_TOKEN" />

  <div class="row" style="margin-top: 1em;">
    <label style="margin:0;">language</label>
    <input id="lang" type="text" placeholder="auto" style="width: 80px;" />
    <label style="margin:0;">partial cadence (ms)</label>
    <input id="cadence" type="text" value="720" style="width: 80px;" />
    <button id="rec">Record</button>
    <button id="stop">Stop</button>
  </div>

  <label style="margin-top:1.5em;">Live partial</label>
  <div class="partial" id="partial">—</div>

  <label>Finals</label>
  <div class="finals" id="finals"></div>

  <div class="metrics" id="metrics">—</div>
  <div class="log" id="log"></div>

<script>
// ---------------------------------------------------------------------------
// getUserMedia → AudioWorklet that downsamples + int16-converts to 16kHz
// mono PCM, ships ~20ms frames over the WS. Partials replace #partial in
// place; finals append into #finals.
// ---------------------------------------------------------------------------

const log = (...a) => {
  const el = document.getElementById("log");
  el.textContent += a.join(" ") + "\n";
  el.scrollTop = el.scrollHeight;
};

const partialEl = document.getElementById("partial");
const finalsEl = document.getElementById("finals");
const metricsEl = document.getElementById("metrics");

let ws = null;
let audioCtx = null;
let mediaStream = null;
let workletNode = null;

const WORKLET_CODE = `
class DownsampleToPCM16 extends AudioWorkletProcessor {
  constructor(options) {
    super();
    this.targetRate = options.processorOptions.targetRate;
    this.buffered = [];
  }
  process(inputs) {
    const input = inputs[0];
    if (!input || !input.length) return true;
    const ch = input[0]; // mono — if stereo, browser typically gives us [L, R]
    const srcRate = sampleRate; // worklet global
    // Simple linear decimation to targetRate. Good enough for 48k → 16k.
    const ratio = srcRate / this.targetRate;
    const outLen = Math.floor(ch.length / ratio);
    const out = new Int16Array(outLen);
    for (let i = 0; i < outLen; i++) {
      const v = ch[Math.floor(i * ratio)];
      out[i] = Math.max(-32768, Math.min(32767, Math.round(v * 32767)));
    }
    this.port.postMessage(out.buffer, [out.buffer]);
    return true;
  }
}
registerProcessor('downsample-pcm16', DownsampleToPCM16);
`;

async function start() {
  stopAll();
  document.getElementById("log").textContent = "";
  finalsEl.innerHTML = "";
  partialEl.textContent = "";

  const host = document.getElementById("host").value.trim();
  const token = document.getElementById("token").value.trim();
  const lang = document.getElementById("lang").value.trim() || null;
  const cadence = parseInt(document.getElementById("cadence").value, 10) || 720;
  if (!host || !token) { log("host/token required"); return; }

  mediaStream = await navigator.mediaDevices.getUserMedia({
    audio: { channelCount: 1, noiseSuppression: true, echoCancellation: true },
  });
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const blob = new Blob([WORKLET_CODE], { type: "application/javascript" });
  const url = URL.createObjectURL(blob);
  await audioCtx.audioWorklet.addModule(url);

  workletNode = new AudioWorkletNode(audioCtx, "downsample-pcm16", {
    processorOptions: { targetRate: 16000 },
  });
  const src = audioCtx.createMediaStreamSource(mediaStream);
  src.connect(workletNode);
  // NB: worklet output not connected to destination — we don't want to
  // play the user's own mic back to them.

  const wsUrl = `${host}/v1/stt/stream?token=${encodeURIComponent(token)}`;
  log("connecting", wsUrl);
  ws = new WebSocket(wsUrl);
  ws.binaryType = "arraybuffer";

  let partialCount = 0;
  let finalCount = 0;
  let lastPartialT = 0;

  ws.onopen = () => {
    ws.send(JSON.stringify({
      type: "config",
      sample_rate: 16000,
      language: lang,
      chunk_interval_ms: cadence,
      speech_end_silence_ms: 300,
    }));
    workletNode.port.onmessage = (ev) => {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(ev.data);
    };
  };

  ws.onmessage = (ev) => {
    if (typeof ev.data !== "string") return;
    const msg = JSON.parse(ev.data);
    if (msg.type === "partial") {
      const now = performance.now();
      const gap = lastPartialT ? (now - lastPartialT) : 0;
      lastPartialT = now;
      partialCount += 1;
      partialEl.textContent = msg.text;
      metricsEl.textContent =
        `partials: ${partialCount}   last interval: ${gap.toFixed(0)}ms   decode: ${msg.decode_ms}ms   finals: ${finalCount}`;
    } else if (msg.type === "final") {
      finalCount += 1;
      partialEl.textContent = "—";
      const div = document.createElement("div");
      div.textContent = msg.punctuated_text || msg.text;
      finalsEl.appendChild(div);
    } else if (msg.type === "speech_start") {
      partialEl.textContent = "…";
    } else if (msg.type === "error") {
      log("error", JSON.stringify(msg));
    }
  };

  ws.onclose = (ev) => log(`closed code=${ev.code} reason=${ev.reason}`);
  ws.onerror = (ev) => log("ws error", String(ev));
}

function stopAll() {
  if (ws) { try { ws.send(JSON.stringify({ type: "stop" })); ws.close(); } catch (_) {} ws = null; }
  if (workletNode) { try { workletNode.disconnect(); } catch (_) {} workletNode = null; }
  if (mediaStream) { try { mediaStream.getTracks().forEach(t => t.stop()); } catch (_) {} mediaStream = null; }
  if (audioCtx) { try { audioCtx.close(); } catch (_) {} audioCtx = null; }
}

document.getElementById("rec").onclick = start;
document.getElementById("stop").onclick = stopAll;
</script>
</body>
</html>
