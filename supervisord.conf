; supervisord config for Larynx workers.
; In M3 the gateway and the Fun-ASR worker share a single Python process
; (via the in-process WorkerChannel) when deployed on one box.
;
; When workers are split to dedicated containers (see
; docker/funasr_worker.Dockerfile + the `workers` compose profile), each
; container runs supervisord with only its own [program:*] block. The
; block below is left in this one file so every container reads the same
; supervisord.conf with the right subset uncommented at image-build time.

[supervisord]
nodaemon=true
logfile=/var/log/supervisord.log
pidfile=/var/run/supervisord.pid

[program:gateway]
command=uv run uvicorn larynx_gateway.main:app --host 0.0.0.0 --port 8000
directory=/app
autostart=true
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0

[program:funasr_worker]
command=uv run larynx-funasr-worker
directory=/app
autostart=false
autorestart=true
stdout_logfile=/dev/stdout
stdout_logfile_maxbytes=0
stderr_logfile=/dev/stderr
stderr_logfile_maxbytes=0
environment=LARYNX_STT_MODE=funasr,LARYNX_FUNASR_GPU=0,CUDA_VISIBLE_DEVICES=1
